version: "3.9"

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dispatcher1:
    build: ./dispatcher
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DISPATCHER_ID=dispatcher-1
      - DRIVER_SECRET=supersecret
      - RATE_LIMIT_REQUESTS=1000
      - RATE_LIMIT_WINDOW=60
      - ASSIGN_TIMEOUT=5.0
      - MAX_RETRIES=3
    depends_on:
      redis:
        condition: service_healthy

  dispatcher2:
    build: ./dispatcher
    ports:
      - "8002:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DISPATCHER_ID=dispatcher-2
      - DRIVER_SECRET=supersecret
      - RATE_LIMIT_REQUESTS=1000
      - RATE_LIMIT_WINDOW=60
      - ASSIGN_TIMEOUT=5.0
      - MAX_RETRIES=3
    depends_on:
      redis:
        condition: service_healthy

  driver1:
    build: ./driver
    ports:
      - "9001:8000"
    environment:
      - DRIVER_ID=driver-1
      - DRIVER_URL=http://driver1:8000
      - DRIVER_SECRET=supersecret
      - DISPATCHER_URL=http://dispatcher1:8000
      - REJECTION_RATE=0.2
    depends_on:
      - dispatcher1

  driver2:
    build: ./driver
    ports:
      - "9002:8000"
    environment:
      - DRIVER_ID=driver-2
      - DRIVER_URL=http://driver2:8000
      - DRIVER_SECRET=supersecret
      - DISPATCHER_URL=http://dispatcher1:8000
      - REJECTION_RATE=0.2
    depends_on:
      - dispatcher1

  driver3:
    build: ./driver
    ports:
      - "9003:8000"
    environment:
      - DRIVER_ID=driver-3
      - DRIVER_URL=http://driver3:8000
      - DRIVER_SECRET=supersecret
      - DISPATCHER_URL=http://dispatcher1:8000
      - REJECTION_RATE=0.2
    depends_on:
      - dispatcher1
  
  driver4:
    build: ./driver
    ports:
      - "9004:8000"
    environment:
      - DRIVER_ID=driver-4
      - DRIVER_URL=http://driver4:8000
      - DRIVER_SECRET=supersecret
      - DISPATCHER_URL=http://dispatcher1:8000
      - REJECTION_RATE=0.2

  driver5:
    build: ./driver
    ports:
      - "9005:8000"
    environment:
      - DRIVER_ID=driver-5
      - DRIVER_URL=http://driver5:8000
      - DRIVER_SECRET=supersecret
      - DISPATCHER_URL=http://dispatcher1:8000
      - REJECTION_RATE=0.2

  watchdog:
    build: ./watchdog
    environment:
      - REDIS_URL=redis://redis:6379
      - STALE_THRESHOLD_SECONDS=15
      - WATCHDOG_INTERVAL=5
    depends_on:
      redis:
        condition: service_healthy
  
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
  
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - dispatcher1
      - dispatcher2