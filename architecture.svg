<line x1="255" y1="146" x2="308" y2="160" stroke="#666" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Dispatchers → Drivers (dashed amber) -->
<line x1="440" y1="96"  x2="498" y2="84"  stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="440" y1="106" x2="498" y2="124" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="440" y1="160" x2="498" y2="170" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="440" y1="168" x2="498" y2="216" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="440" y1="174" x2="498" y2="262" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

<!-- Dispatchers → ride:queue -->
<path d="M375 184 L375 220 L115 220 L115 328" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Dispatchers → driver:queue -->
<path d="M375 184 L375 230 L300 230 L300 328" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Dispatchers → pending_assignments -->
<path d="M440 162 L495 270 L495 328" fill="none" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Drivers → driver:queue re-register -->
<path d="M555 280 L555 300 L620 300 L620 355 L382 355" fill="none" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Watchdog → pending_assignments -->
<line x1="380" y1="445" x2="412" y2="382" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

<!-- Watchdog → driver:queue rescue -->
<line x1="300" y1="420" x2="300" y2="382" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

<!-- Prometheus scrapes dispatchers -->
<path d="M100 520 L100 490 L375 490 L375 186" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- Grafana → Prometheus -->
<line x1="235" y1="520" x2="162" y2="564" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)" fill="none"/>

