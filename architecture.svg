<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="515" y="553" text-anchor="middle">:8089</text>

<!-- ══ EDGES ══ -->

<!-- Clients → Nginx -->
<line x1="110" y1="102" x2="153" y2="120" stroke="#666" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="110" y1="162" x2="153" y2="142" stroke="#666" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

